<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your bouquet is ready — Forever Yours." />
  <title>Your Bouquet — Forever Yours</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet" />

  
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/navbar.css" />
  <link rel="stylesheet" href="assets/css/bouquet-preview.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>

  
  <div class="page-loader" role="status" aria-label="Loading">
    <div class="loader__ring"></div>
    <p class="loader__text">Forever Yours</p>
  </div>

  
  <div class="progress-bar-wrap" role="progressbar"
       aria-valuemin="0" aria-valuemax="100" aria-valuenow="75">
    <div class="progress-bar" style="width:75%"></div>
  </div>

  
  <header class="navbar--minimal" role="banner">
    <a href="index.html" class="navbar__logo" aria-label="Forever Yours Home">
      Forever <span>Yours</span>
    </a>
  </header>

  
  <div class="preview-page__bloom" aria-hidden="true"></div>


  
  <main class="preview-page" id="main-content">

    <div class="preview-content">

      
      <div class="bouquet-illustration" aria-label="Your bouquet illustration">

        
        <div class="bouquet-halo" id="bouquet-halo" aria-hidden="true"></div>

        
        <div class="bouquet-flowers" id="bouquet-flowers"
             role="img" aria-label="Selected flowers"></div>

        
        <div class="bouquet-ribbon" id="bouquet-ribbon" aria-hidden="true"></div>

        
        <div class="bouquet-wrapping" id="bouquet-wrapping"></div>

      </div>


      
      <h1 class="preview-title" id="preview-title">
        Your bouquet is <em>ready</em>
      </h1>

      <p class="preview-subtitle" id="preview-subtitle">
        Every flower chosen with intention
      </p>


      
      <div class="bouquet-details" id="bouquet-details" aria-label="Bouquet details">

        
        <div class="details-section">
          <span class="details-section__label">Flowers</span>
          <div class="flower-list" id="detail-flowers" role="list"></div>
        </div>

        <div class="details-divider" aria-hidden="true"></div>

        
        <div class="details-section">
          <span class="details-section__label">Ribbon</span>
          <div class="details-ribbon" id="detail-ribbon"></div>
        </div>

        <div class="details-divider" aria-hidden="true"></div>

        
        <div class="details-section">
          <span class="details-section__label">Wrapping</span>
          <div class="details-wrapping" id="detail-wrapping"></div>
        </div>

      </div>


      
      <div class="preview-actions" id="preview-actions">

        <a href="bouquet.html" class="btn-edit-bouquet" aria-label="Go back and edit bouquet">
          ← Edit Bouquet
        </a>

        <a href="enter-passcode.html" class="btn-set-passcode"
           aria-label="Continue to set your passcode">
          <span>Set Your Passcode →</span>
        </a>

      </div>

    </div>

  </main>


  
  <script src="assets/js/loader.js"></script>
  <script src="assets/js/services/local-storage.js"></script>
  <script src="assets/js/creator-flow.js"></script>
  <script src="assets/js/bouquet/bouquet-storage.js"></script>
  <script src="assets/js/bouquet/bouquet-preview.js"></script>

</body>
</html>
