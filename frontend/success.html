<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="They said yes — Forever Yours." />
  <title>They Said Yes — Forever Yours</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/success.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>
<body>

  <div class="page-loader" role="status" aria-label="Loading">
    <div class="loader__ring"></div>
    <p class="loader__text">Forever Yours</p>
  </div>

  <audio id="bg-music" preload="auto" aria-hidden="true">
    <source src="assets/music/acknowledge.mp3" type="audio/mpeg" />
  </audio>

  <div class="tap-to-start hidden" id="tap-to-start"
       role="button" tabindex="0" aria-label="Tap to start celebration">
    <span class="tap-to-start__icon" aria-hidden="true">♥</span>
    <p class="tap-to-start__text">Tap to celebrate</p>
    <p class="tap-to-start__sub">They said yes!</p>
  </div>

  <canvas id="heartsCanvas" aria-hidden="true"></canvas>
  <canvas id="fireworksCanvas" aria-hidden="true"></canvas>
  <canvas id="confettiCanvas" aria-hidden="true"></canvas>

  <div class="success-page" id="success-page">

    <div class="success-page__glow" aria-hidden="true"></div>

    <div class="success-content" role="main" aria-label="Celebration">

      <h1 class="success-yes" id="success-yes" aria-label="Yes!">
        Yes!
      </h1>

      <p class="success-label" id="success-label" aria-live="polite">
        They Said Yes
      </p>

      <p class="success-names" id="success-names" aria-live="polite">
        <span id="success-sender"></span>
        <span class="success-names__ampersand" aria-hidden="true">♥</span>
        <span id="success-recipient"></span>
      </p>

      <p class="success-date" id="success-date" aria-live="polite"></p>

      <div class="success-ornament" id="success-ornament" aria-hidden="true">
        <span class="success-ornament__line"></span>
        <span class="success-ornament__heart">♥</span>
        <span class="success-ornament__line"></span>
      </div>

      <div class="success-actions" id="success-actions">

        <button class="btn-share-success" id="btn-share-success"
                aria-label="Share this moment">
          <span>Share Moment</span>
        </button>

        <a href="create-proposal.html" class="btn-new-success"
           aria-label="Create a new proposal">
          Create a new proposal →
        </a>

      </div>

    </div>

  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/loader.js"></script>
  <script src="assets/js/services/local-storage.js"></script>
  <script src="assets/js/proposal/acceptance-animation.js"></script>

</body>
</html>
